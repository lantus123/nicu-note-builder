<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NICU Note Builder</title>
<style>
  :root{
    --bg:#f4f6f9; --card:#fff; --ink:#1f2937; --muted:#6b7280;
    --line:#e5e7eb; --brand:#2563eb; --brand-d:#1d4ed8; --ok:#059669;
    --warn:#b45309; --warn-bg:#fef3c7; --chip:#eef2ff; --chip-ink:#3730a3;
    --radius:12px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,"PingFang TC","Noto Sans TC","Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--ink); font-size:15px; line-height:1.5;
    -webkit-text-size-adjust:100%;
  }
  header{
    position:sticky; top:0; z-index:20; background:var(--brand); color:#fff;
    padding:10px 14px; display:flex; align-items:center; gap:10px;
    box-shadow:0 1px 6px rgba(0,0,0,.15);
  }
  header h1{font-size:16px; margin:0; font-weight:700; flex:1}
  header .era{display:flex; gap:4px; background:rgba(255,255,255,.15); border-radius:8px; padding:3px}
  header .era button{
    border:0; background:transparent; color:#fff; padding:4px 10px; border-radius:6px;
    font-size:12px; cursor:pointer;
  }
  header .era button.on{background:#fff; color:var(--brand); font-weight:700}
  .wrap{max-width:900px; margin:0 auto; padding:10px 10px 120px}
  .tabs{display:flex; gap:6px; margin:10px 2px}
  .tabs button{
    flex:1; border:1px solid var(--line); background:var(--card); color:var(--muted);
    padding:9px 6px; border-radius:10px; font-size:13px; font-weight:600; cursor:pointer;
  }
  .tabs button.on{background:var(--brand); color:#fff; border-color:var(--brand)}
  .tabs button:disabled{opacity:.5; cursor:not-allowed}
  details.sec{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    margin:8px 0; overflow:hidden;
  }
  details.sec>summary{
    list-style:none; cursor:pointer; padding:12px 14px; font-weight:700; font-size:14px;
    display:flex; align-items:center; gap:8px; user-select:none;
  }
  details.sec>summary::-webkit-details-marker{display:none}
  details.sec>summary::after{content:"▾"; margin-left:auto; color:var(--muted); transition:transform .15s}
  details.sec[open]>summary::after{transform:rotate(180deg)}
  .sec .body{padding:4px 14px 14px}
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:10px}
  .grid.three{grid-template-columns:1fr 1fr 1fr}
  @media(max-width:560px){.grid,.grid.three{grid-template-columns:1fr 1fr}}
  .field{display:flex; flex-direction:column; gap:3px; margin:2px 0}
  .field.full{grid-column:1/-1}
  .field label{font-size:12px; color:var(--muted); font-weight:600}
  .field input,.field select,.field textarea{
    border:1px solid var(--line); border-radius:9px; padding:8px 9px; font-size:14px;
    background:#fff; color:var(--ink); font-family:inherit; width:100%;
  }
  .field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--brand); border-color:var(--brand)}
  .row-inline{display:flex; gap:6px; align-items:center}
  .row-inline input{width:100%}
  .checks{display:flex; flex-wrap:wrap; gap:6px; margin-top:4px}
  .chk{
    display:inline-flex; align-items:center; gap:5px; border:1px solid var(--line);
    background:#fff; border-radius:20px; padding:5px 11px; font-size:13px; cursor:pointer; user-select:none;
  }
  .chk input{accent-color:var(--brand); margin:0}
  .chk.on{background:var(--chip); border-color:#c7d2fe; color:var(--chip-ink); font-weight:600}
  .scr3{cursor:pointer}
  .scr3.pos{background:#fef2f2; border-color:#fecaca; color:#b91c1c; font-weight:700}
  /* paste & review */
  .paste-sec>summary{background:#eff6ff}
  #pasteBox{width:100%; border:1px solid var(--line); border-radius:9px; padding:10px; font-size:13px; font-family:"SFMono-Regular",Menlo,monospace; line-height:1.5; resize:vertical}
  #pasteBox:focus{outline:2px solid var(--brand); border-color:var(--brand)}
  #reviewPanel{margin-top:10px; display:flex; flex-direction:column; gap:4px}
  .rev{display:flex; gap:8px; align-items:baseline; padding:6px 10px; border-radius:8px; font-size:12px; border:1px solid transparent}
  .rev.ok{background:#ecfdf5; border-color:#a7f3d0}
  .rev.warn{background:#fffbeb; border-color:#fde68a}
  .rev .rk{font-weight:700; min-width:104px; flex-shrink:0}
  .rev .rv{color:var(--ink); word-break:break-word}
  .rev .rt{margin-left:auto; font-size:11px; font-weight:700; white-space:nowrap; flex-shrink:0}
  .rev.ok .rt{color:var(--ok)}
  .rev.warn .rt{color:var(--warn)}
  .rev-legend{display:flex; gap:14px; margin:8px 0 2px; font-size:12px; font-weight:600}
  .rev-legend .lg{display:inline-flex; align-items:center; gap:5px}
  .rev-legend .dot{width:12px; height:12px; border-radius:3px; border:1px solid}
  .rev-legend .dot.ok{background:#ecfdf5; border-color:#a7f3d0}
  .rev-legend .dot.warn{background:#fffbeb; border-color:#fde68a}
  /* 自動帶入後表單欄位提示 */
  .field.filled input,.field.filled select,.field.filled textarea{background:#f0fdf4}
  .chk.autofill{box-shadow:0 0 0 2px #a7f3d0}
  .hint{font-size:11px; color:var(--muted); margin-top:2px}
  .calc-badge{
    display:inline-block; background:#ecfdf5; color:var(--ok); border:1px solid #a7f3d0;
    border-radius:6px; padding:1px 7px; font-size:11px; font-weight:700; margin-left:6px;
  }
  .sub{margin-left:14px; padding-left:10px; border-left:2px solid var(--line)}
  /* output */
  #outputCard{
    position:sticky; bottom:0; z-index:15; background:var(--card);
    border:1px solid var(--line); border-radius:var(--radius) var(--radius) 0 0;
    margin:10px -10px 0; box-shadow:0 -3px 14px rgba(0,0,0,.08);
  }
  #outputCard .oc-head{display:flex; align-items:center; gap:8px; padding:10px 14px 4px}
  #outputCard .oc-head b{font-size:13px; flex:1}
  .btn{border:0; border-radius:9px; padding:8px 14px; font-size:13px; font-weight:700; cursor:pointer}
  .btn.primary{background:var(--brand); color:#fff}
  .btn.ghost{background:#eef2ff; color:var(--brand)}
  .btn.mini{padding:5px 9px; font-size:12px}
  #output{
    min-height:150px; max-height:46vh; overflow:auto; border-top:1px solid var(--line);
    padding:12px 14px; font-family:"SFMono-Regular",Menlo,Consolas,monospace; font-size:13px;
    line-height:1.65; color:var(--ink); white-space:pre-wrap; word-break:break-word;
  }
  #output:focus{outline:none; background:#fffdf5}
  #output .hl-ok{background:#d1fae5; border-radius:3px; padding:0 2px}
  #output .hl-warn{background:#fde047; border-radius:3px; padding:0 2px; font-weight:700}
  .out-legend{display:flex; gap:14px; padding:2px 14px 6px; font-size:11px; color:var(--muted)}
  .out-legend .sw{display:inline-block; width:11px; height:11px; border-radius:2px; vertical-align:-1px; margin-right:4px}
  .editflag{display:none; align-items:center; gap:8px; padding:6px 14px; background:var(--warn-bg); color:var(--warn); font-size:12px}
  .editflag.on{display:flex}
  .pedigree{white-space:pre; font-family:monospace; font-size:14px; background:#f9fafb; border:1px solid var(--line); border-radius:8px; padding:10px; margin-top:6px}
  .toast{
    position:fixed; left:50%; bottom:80px; transform:translateX(-50%) translateY(20px);
    background:#111827; color:#fff; padding:9px 18px; border-radius:22px; font-size:13px;
    opacity:0; transition:.2s; pointer-events:none; z-index:50;
  }
  .toast.on{opacity:1; transform:translateX(-50%) translateY(0)}
  .stub{padding:40px 20px; text-align:center; color:var(--muted)}
</style>
</head>
<body>
<header>
  <h1>NICU Note Builder</h1>
  <div class="era" id="eraToggle">
    <button data-era="ce" class="on">西元</button>
    <button data-era="roc">民國</button>
  </div>
</header>

<div class="wrap">
  <div class="tabs">
    <button class="on" data-note="admission">Admission</button>
    <button data-note="acceptance" disabled>Acceptance</button>
    <button data-note="procedure" disabled>Procedure</button>
  </div>

  <form id="form"><!-- admission form injected here --></form>
</div>

<div id="outputCard">
  <div class="oc-head">
    <b>成稿（可直接編輯）</b>
    <button type="button" class="btn ghost mini" id="regenBtn">重新產生</button>
    <button type="button" class="btn primary mini" id="copyBtn">複製</button>
  </div>
  <div class="out-legend">
    <span><span class="sw" style="background:#d1fae5"></span>已帶入的關鍵值</span>
    <span><span class="sw" style="background:#fde047"></span>待補（空格請手動填）</span>
  </div>
  <div class="editflag" id="editFlag">
    <span>已手動編輯，表單變更不會自動覆蓋</span>
    <button type="button" class="btn ghost mini" id="unlockBtn">放棄手改・重新產生</button>
  </div>
  <div id="output" contenteditable="true" spellcheck="false"></div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";
/* ============================================================
   NICU Note Builder — 雛形 v0.1（admission note）
   單檔、純前端、病人資料不離開瀏覽器
   ============================================================ */

const $ = (s,r=document)=>r.querySelector(s);
const $$ = (s,r=document)=>[...r.querySelectorAll(s)];

let ERA = "ce";                 // ce=西元, roc=民國
let manualEdit = false;         // 使用者是否手改過成稿

/* ---------- state ---------- */
const S = {
  // basics
  sex:"girl", ageDesc:"1-day-old",
  birthDate:"", birthTime:"", hospital:"TPEMMH",
  gaW:"", gaD:"", bw:"", sizeClass:"AGA",
  gravida:"2", para:"2", matAge:"", edc:"", chartNo:"",
  // delivery
  delivery:"cesarean", csReason:"", deliverySmooth:true,
  // prenatal
  ancPlace:"TPEMMH", ancOutside:"", usNormal:true, level2:true,
  matHx:{}, matHxOther:"",
  scr:{hbsag:"neg",syphilis:"neg",rubella:"neg",hiv:"neg",gbs:"neg"},
  toccNone:true,
  // course
  steroid:false, steroidDose:"2", steroidNote:"",
  mgso4:false, abx:false, abxDrug:"cefazolin",
  rom:"none", romHours:"", romNote:"",
  matInfNote:"", obNote:"",
  // delivery event
  apgarPts:"2", a1:"", a5:"", a7:"", a10:"",
  fetalDistress:false, meconium:false, doic:false, placentaDirty:false,
  // resuscitation
  resusLevel:"none", ippeep:"", fio2:"", ettSize:"", ettTime:"",
  epiTime:"", resusOutcome:"",
  // postnatal
  symptoms:{}, cyanosis:false, brady:false, spo2:"",
  support:"none", supportSet:"", physical:{}, resolved:true,
  // admission & dx
  admitTo:"NICU", dxFormat:"prose", dx:{}, dxOther:"",
  // pedigree
  sibs:[],  // array of {sex:'boy'|'girl', proband:bool}
  // operator
  operator:""
};

/* ---------- helpers ---------- */
const he = s => s;  // (placeholder for escaping if needed)
function pron(){ return S.sex==="boy" ? {subj:"he",obj:"him",poss:"his",noun:"male infant"} : {subj:"she",obj:"her",poss:"her",noun:"girl"}; }

// 民國/西元 換算與格式化。輸入 birthDate 一律存西元 yyyy-mm-dd
function fmtDate(iso){
  if(!iso) return "____/__/__";
  const [y,m,d]=iso.split("-").map(Number);
  if(ERA==="roc") return `${y-1911}/${m}/${d}`;
  return `${y}/${String(m).padStart(2,"0")}/${String(d).padStart(2,"0")}`;
}
function todayISO(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function daysBetween(iso){
  if(!iso) return null;
  const b=new Date(iso+"T00:00:00"); const t=new Date(todayISO()+"T00:00:00");
  return Math.round((t-b)/86400000);
}

/* ---------- 自動計算 ---------- */
function gaWeeksNum(){ const w=parseInt(S.gaW,10); return isNaN(w)?null:w; }
function prematureDx(){
  const w=gaWeeksNum(); if(w===null) return null;
  if(w<37) return "Prematurity";
  return null;
}
function weightClassDx(){
  const g=parseInt(S.bw,10); if(isNaN(g)) return null;
  if(g<1000) return "ELBW";
  if(g<1500) return "VLBW";
  if(g<2500) return "LBW";
  return null;
}
function ageDesc(){ return S.ageDesc==="just-born" ? "just-born" : (S.ageDesc || "1-day-old"); }
// 依出生日與今天建議 day-old（僅供欄位旁提示，不強制覆寫）
function suggestAge(){ const d=S.birthDate?daysBetween(S.birthDate):null; if(d===null) return ""; if(d<=0) return "just-born"; return d+"-day-old"; }
// ETT/UVC 估算（供 procedure note；此處先備用）
function ettByWeight(){
  const g=parseInt(S.bw,10); if(isNaN(g)) return null;
  if(g<1000) return {size:"2.5", depth:(6+1).toFixed(0)};
  if(g<2000) return {size:"3.0", depth:"7-8"};
  if(g<3000) return {size:"3.0-3.5", depth:"8-9"};
  return {size:"3.5", depth:"9-10"};
}

/* ============================================================
   產稿引擎
   ============================================================ */
function generate(){
  const p=pron();
  const parts=[];

  /* 1. 開場出生句 */
  const deliveryPhrase = {
    NSD:"vaginal delivery", VD:"vaginal delivery",
    VDpainless:"vaginal delivery (with painless)",
    cesarean:"cesarean section", emergent:"emergent cesarean section"
  }[S.delivery] || "vaginal delivery";
  let via = deliveryPhrase;
  if(S.delivery==="emergent" && S.csReason) via += ` due to ${S.csReason}`;
  const matAge = S.matAge ? `${S.matAge}-year-old ` : "";
  const gp = `G${S.gravida}P${S.para}`;
  let s1 = `This ${ageDesc()} ${p.noun} was born to a ${matAge}${gp} mother via ${via} on ${fmtDate(S.birthDate)}`;
  if(S.birthTime) s1 += ` at ${S.birthTime}`;
  s1 += ` at ${S.hospital}.`;
  const gaStr = (S.gaW||"__")+(S.gaD?`+${S.gaD}`:"")+" weeks";
  const bwStr = S.bw ? `${S.bw} g` : "____ g";
  s1 += ` The gestational age was ${gaStr}, and the birth body weight was ${bwStr}, ${sizeLong(S.sizeClass)}.`;
  if(S.edc) s1 += ` The estimated date of confinement was ${fmtDate(S.edc)}.`;
  parts.push(s1);

  /* 2. 產檢與母體病史 */
  const ancPlace = S.ancPlace==="TPEMMH" ? S.hospital : (S.ancOutside||"an outside clinic");
  let s2 = `Regular prenatal examinations were performed at ${ancPlace}.`;
  const usBits=[];
  if(S.usNormal) usBits.push("Prenatal ultrasound"+(S.level2?" and level II sonography":"")+" revealed no significant abnormalities.");
  if(usBits.length) s2 += " "+usBits.join(" ");
  parts.push(s2);

  // 母體病史 positives
  const pos=[];
  if(S.matHx.gdm) pos.push("gestational diabetes mellitus"+(S.matHx.gdmInsulin?" (on insulin)":" (diet-controlled)"));
  if(S.matHx.preeclampsia) pos.push("high risk of preeclampsia (on Aspirin)");
  if(S.matHx.thalassemia) pos.push("thalassemia");
  if(S.matHx.gerd) pos.push("GERD");
  if(S.matHx.htn) pos.push("hypertension");
  if(S.matHx.other && S.matHxOther) pos.push(S.matHxOther);

  let matSent="";
  if(pos.length){
    matSent = `The mother had ${listJoin(pos)}. `;
  }
  // 否定安全網（用 or；有陽性病史在前 → 加 "other"）
  const denySet = ["gestational diabetes mellitus","antepartum hemorrhage","preeclampsia","G6PD deficiency","thyroid disease","hematologic disorders","sexually transmitted diseases"];
  const denies = denySet.filter(d=>{
    if(d.startsWith("gestational") && S.matHx.gdm) return false;
    if(d==="preeclampsia" && S.matHx.preeclampsia) return false;
    if(d==="hematologic disorders" && S.matHx.thalassemia) return false;
    return true;
  });
  if(denies.length){
    matSent += pos.length
      ? `She denied other history of ${listJoinOr(denies)}.`
      : `The mother denied a history of ${listJoinOr(denies)}.`;
  }
  if(matSent) parts.push(matSent.trim());

  /* 3. 產前篩檢（三態：neg/pos/unknown；unknown 不寫入任何句） */
  const scrNeg=[], scrPos=[];
  const scrLabel={hbsag:"hepatitis B",syphilis:"syphilis",rubella:"rubella",hiv:"HIV infection",gbs:"group B streptococcus (GBS)"};
  Object.keys(S.scr).forEach(k=>{
    if(S.scr[k]==="unknown") return;
    (S.scr[k]==="pos"?scrPos:scrNeg).push(scrLabel[k]);
  });
  let s3="";
  if(scrNeg.length) s3 += `Prenatal screening tests were negative for ${listJoin(scrNeg)}.`;
  if(S.scr.hbsag==="pos") s3 += (s3?" ":"")+"HBsAg and HBeAg were positive.";
  if(S.scr.gbs==="pos") s3 += (s3?" ":"")+"Group B streptococcus (GBS) screening was positive, and intravenous cefazolin was administered as intrapartum antibiotic prophylaxis before delivery.";
  const otherPos=scrPos.filter(x=>x!=="hepatitis B" && x!=="group B streptococcus (GBS)");
  if(otherPos.length) s3 += (s3?" ":"")+`Screening was positive for ${listJoin(otherPos)}.`;
  if(S.toccNone) s3 += (s3?" ":"")+"There was no contributory TOCC or travel history.";
  if(s3) parts.push(s3);

  /* 4. 本次住院經過與產前處置（條件式） */
  const course=[];
  if(S.obNote) course.push(S.obNote.trim());
  const preTx=[];
  if(S.steroid) preTx.push(`antenatal betamethasone (${S.steroidDose} dose${S.steroidDose==="1"?"":"s"}${S.steroidNote?" "+S.steroidNote:""})`);
  if(S.mgso4) preTx.push("MgSO4 for tocolysis");
  if(S.abx) preTx.push(`intravenous ${S.abxDrug}`);
  if(preTx.length) course.push(`Before delivery, ${listJoin(preTx)} ${preTx.length>1?"were":"was"} administered.`);
  if(S.rom!=="none"){
    const romMap={PROM:"premature rupture of membranes",PPROM:"preterm premature rupture of membranes",RPROM:"rupture of membranes"};
    let r=`${romMap[S.rom]||S.rom}`+(S.romHours?` for ${S.romHours} hours`:"");
    if(S.romNote) r+=` (${S.romNote})`;
    course.push(cap1(r)+" was noted.");
  }
  if(S.matInfNote) course.push(S.matInfNote.trim());
  if(course.length) parts.push(course.join(" "));

  /* 5. 生產與 Apgar */
  const dl=[];
  let apg;
  if(S.apgarPts==="4"){
    apg=`Apgar scores were ${S.a1||"_"}, ${S.a5||"_"}, ${S.a7||"_"}, and ${S.a10||"_"} at 1, 5, 7, and 10 minutes, respectively.`;
  }else{
    apg=`The Apgar scores were ${S.a1||"_"} and ${S.a5||"_"} at 1st and 5th minute, respectively.`;
  }
  dl.push(apg);
  const negEvents=[], posEvents=[];
  (S.fetalDistress?posEvents:negEvents).push("fetal distress");
  (S.meconium?posEvents:negEvents).push("meconium-stained amniotic fluid");
  (S.doic?posEvents:negEvents).push("delay of initial crying");
  if(S.resusLevel==="none") negEvents.push("need for neonatal resuscitation");
  if(posEvents.length) dl.push(cap1(listJoin(posEvents))+(posEvents.length>1?" were":" was")+" noted.");
  if(negEvents.length) dl.push("There was no "+listJoinOr(negEvents)+".");
  if(S.placentaDirty) dl.push("The placenta and amniotic fluid were dirty.");
  parts.push(dl.join(" "));

  /* 6. 產房急救（階梯，條件式） */
  if(S.resusLevel!=="none"){
    const r=[];
    if(S.ippeep) r.push(`Positive-pressure ventilation with Neopuff (IP/PEEP ${S.ippeep} cmH2O${S.fio2?`, FiO2 ${S.fio2}%`:""}) was given after birth.`);
    else r.push("Positive-pressure ventilation was given after birth.");
    if(S.resusLevel==="intubation"||S.resusLevel==="cpr"){
      r.push(`Endotracheal intubation with a ${S.ettSize||"3.0"}-mm endotracheal tube was performed${S.ettTime?` at ${S.ettTime}`:""}.`);
    }
    if(S.resusLevel==="cpr"){
      r.push("Cardiopulmonary resuscitation was initiated.");
      r.push(`Epinephrine (1:10000) 1 mL/kg was administered via the endotracheal tube${S.epiTime?` at ${S.epiTime}`:""}.`);
    }
    if(S.resusOutcome) r.push(S.resusOutcome.trim());
    parts.push(r.join(" "));
  }

  /* 7. 出生後表現與呼吸支持 */
  const symLabel={tachypnea:"tachypnea",retraction:"subcostal retractions",grunting:"grunting",sob:"shortness of breath",intret:"intermittent retractions"};
  const syms=Object.keys(S.symptoms).filter(k=>S.symptoms[k]).map(k=>symLabel[k]);
  let s7="";
  if(syms.length){
    let tail="";
    if(!S.cyanosis && !S.brady) tail=" without cyanosis or bradycardia";
    else{
      const t=[]; if(S.cyanosis)t.push("cyanosis"); if(S.brady)t.push("bradycardia");
      if(t.length) tail=" with "+listJoin(t);
    }
    s7=`After birth, ${listJoin(syms)}${tail} ${syms.length>1?"were":"was"} noted.`;
  }
  const phys=[];
  if(S.physical.caput) phys.push("caput succedaneum");
  if(S.physical.cephalo) phys.push("cephalohematoma");
  if(phys.length) s7 += (s7?" ":"")+cap1(listJoin(phys))+(phys.length>1?" were":" was")+" also noted.";
  if(S.support!=="none"){
    const supMap={hood:`oxygen hood therapy${S.spo2?` (SpO2 around ${S.spo2}%)`:""}`,neopuff:`respiratory support with IP/PEEP ${S.supportSet||"20/5"} cmH2O`};
    s7 += (s7?" ":"")+cap1(supMap[S.support]||S.support)+" was provided"+(S.resolved?", after which the condition improved":"")+".";
  } else if(S.spo2){
    s7 += (s7?" ":"")+`Oxygen saturation was around ${S.spo2}%.`;
  }
  if(s7) parts.push(s7);

  /* 8. tentative diagnosis 結尾 */
  const dxList=collectDx();
  const admitWard = S.admitTo==="NICU" ? "the neonatal intensive care unit (NICU)" : "our ward";
  let s8;
  if(S.dxFormat==="list" && dxList.length){
    s8 = `Under the tentative diagnosis of\n${dxList.map(d=>"# "+d).join(", ")},\n${p.subj} was admitted to ${admitWard} for further evaluation and management.`;
  }else{
    s8 = `Under the tentative diagnosis of ${dxList.length?listJoin(dxList):"respiratory distress"}, ${p.subj} was admitted to ${admitWard} for further evaluation and ${S.admitTo==="NICU"?"management":"treatment"}.`;
  }
  parts.push(s8);

  /* 9. Maternal Chart + pedigree */
  let tail="";
  if(S.chartNo) tail += `\n\nMaternal Chart No. ${S.chartNo}`;
  const ped=buildPedigree();
  if(ped) tail += `\n\n${ped}`;
  if(S.operator) tail += `\n\n${S.operator}`;

  return parts.join(" ").replace(/\s+\./g,".").replace(/ {2,}/g," ") + tail;
}

function collectDx(){
  const auto=[];
  const prem=prematureDx();
  if(prem){ auto.push(`${prem}, GA ${(S.gaW||"__")}${S.gaD?"+"+S.gaD:""} weeks, BW ${S.bw||"__"} g, ${S.sizeClass}`); }
  const wc=weightClassDx();
  if(wc) auto[auto.length-1] = auto.length? auto[auto.length-1]+`, ${wc}` : wc;
  // 使用者勾選
  const dxLabel={rds:"respiratory distress syndrome",rd:"respiratory distress",ttn:"transient tachypnea of the newborn",asphyxia:"birth asphyxia",idm:"infant of a diabetic mother",eos:"rule out early-onset neonatal sepsis"};
  Object.keys(S.dx).forEach(k=>{ if(S.dx[k]&&dxLabel[k]) auto.push(dxLabel[k]); });
  if(S.matHx.gdm && !S.dx.idm) auto.push("infant of a diabetic mother");
  if(S.resusLevel==="cpr" && !S.dx.asphyxia) auto.push("birth asphyxia");
  if(S.dxOther) auto.push(S.dxOther);
  // 去重
  return [...new Set(auto)];
}

/* ---------- 小工具 ---------- */
function listJoin(arr){   // 肯定/negative for… 用 and
  arr=arr.filter(Boolean);
  if(arr.length===0) return "";
  if(arr.length===1) return arr[0];
  if(arr.length===2) return arr[0]+" and "+arr[1];
  return arr.slice(0,-1).join(", ")+", and "+arr[arr.length-1];
}
function listJoinOr(arr){  // 否定句 There was no… / denied… 用 or
  arr=arr.filter(Boolean);
  if(arr.length===0) return "";
  if(arr.length===1) return arr[0];
  if(arr.length===2) return arr[0]+" or "+arr[1];
  return arr.slice(0,-1).join(", ")+", or "+arr[arr.length-1];
}
function cap1(s){ return s ? s.charAt(0).toUpperCase()+s.slice(1) : s; }
function sizeLong(c){ return {AGA:"appropriate for gestational age (AGA)",SGA:"small for gestational age (SGA)",LGA:"large for gestational age (LGA)"}[c]||c; }

/* ============================================================
   家系圖產生器
   symbol: □=male ○=female；實心 ■/● = proband
   ============================================================ */
function buildPedigree(){
  const sibs=S.sibs;
  if(!sibs.length) return "";
  const pad=n=>" ".repeat(Math.max(0,n));
  const sym=k=> k.sex==="boy" ? (k.proband?"■":"□") : (k.proband?"●":"○");
  const kids=sibs.map(sym);
  const parent="□─────○";           // 父□─母○，中點在 index 3
  if(kids.length===1){
    return `${parent}\n${pad(3)}│\n${pad(3)}${kids[0]}`;
  }
  // 多子代：kids 以 3 空格分隔，sibling bar 在每個 kid 上方分岔；整體對齊到父母中點(3)
  let kidRow=kids.join("   ");
  const cols=[]; { let c=0; kids.forEach(()=>{ cols.push(c); c+=4; }); }
  const first=cols[0], last=cols[cols.length-1], bmid=Math.floor((first+last)/2);
  const kidPad=Math.max(0,3-bmid), parentPad=Math.max(0,bmid-3), stemCol=Math.max(bmid,3);
  let bracket=""; for(let c=0;c<=last;c++){ bracket += cols.includes(c) ? "┬" : (c>first&&c<last?"─":" "); }
  return `${pad(parentPad)}${parent}\n${pad(stemCol)}│\n${pad(kidPad)}${bracket}\n${pad(kidPad)}${kidRow}`;
}

/* ============================================================
   HIS 貼上解析器
   ============================================================ */
function hisGet(t,label){
  const esc=label.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
  // 值讀到 ; / 換行 / 或「2+空格後接另一個 標籤：」為止（標籤可含空格，如 Meconium stain）
  const m=t.match(new RegExp(esc+"\\s*[:：]\\s*(.*?)(?=\\s{2,}[^:：\\n]+?[:：]|[;\\n]|$)","i"));
  return m?m[1].trim():null;
}
function hisNeg(v){ return v==null||v===""||v==="-"||/^[-–]\s*(hour|min|day)/i.test(v)||/^無$/.test(v); }
function hisPos(v){ return v!=null && (v==="+"||/^\+/.test(v)); }
function parseDateFlex(s){
  if(!s) return "";
  const m=s.match(/(\d{2,4})[\/\-.](\d{1,2})[\/\-.](\d{1,2})/);
  if(!m) return "";
  let y=+m[1]; if(y<1911) y+=1911;   // 民國→西元
  return `${y}-${String(+m[2]).padStart(2,"0")}-${String(+m[3]).padStart(2,"0")}`;
}
function parseTimeFlex(s){ const m=(s||"").match(/(\d{1,2}):(\d{2})/); return m?`${m[1]}:${m[2]}`:""; }

// 主解析：讀 text → 改 S → 回傳 review rows
function parseHIS(text){
  const t=text.replace(/\r/g,"");
  const ok=[], warn=[];
  const G=l=>hisGet(t,l);
  const addOk=(k,raw,into)=>ok.push({k,raw:(raw==null?"":String(raw)),into});
  const addWarn=(k,raw,why)=>warn.push({k,raw:(raw==null?"":String(raw)),why});

  /* --- Prenatal --- */
  const site=G("產檢醫院");
  if(site!=null){
    if(/TPEMMH|本院|馬偕|Taipei/i.test(site)){ S.ancPlace="TPEMMH"; }
    else { S.ancPlace="outside"; S.ancOutside=site; }
    addOk("產檢醫院",site,"產檢院所");
  }
  // 母體病史
  const dm=G("DM"); if(dm!=null){ if(!hisNeg(dm)){ S.matHx.gdm=true; if(/insulin/i.test(dm)) S.matHx.gdmInsulin=true; addOk("DM",dm,"母病史 GDM"); } else addOk("DM",dm,"陰性（併入 denied）"); }
  const htn=G("HTN"); if(htn!=null){ S.matHx.htn=!hisNeg(htn); addOk("HTN",htn, hisNeg(htn)?"陰性":"母病史 HTN"); }
  const pre=G("Preeclampsia"); if(pre!=null){ S.matHx.preeclampsia=!hisNeg(pre); addOk("Preeclampsia",pre, hisNeg(pre)?"陰性":"母病史 preeclampsia"); }
  const aph=G("APH"); if(aph!=null) addOk("APH",aph, hisNeg(aph)?"陰性（併入 denied）":"⚠ APH 陽性");
  const pph=G("PPH"); if(pph!=null){ if(hisNeg(pph)) addOk("PPH",pph,"陰性"); else addWarn("PPH",pph,"陽性，工具無此欄位，請手動加入"); }
  const uri=G("URI"); if(uri!=null){ if(hisNeg(uri)) addOk("URI",uri,"陰性"); else addWarn("URI",uri,"陽性，請確認是否寫入"); }
  const others=G("Others");
  if(others!=null && !hisNeg(others)){
    if(/thalassemia/i.test(others)) S.matHx.thalassemia=true;
    const extra=others.split(/,\s*/).filter(x=>x && !/thalassemia/i.test(x));
    if(extra.length){ S.matHx.other=true; S.matHxOther=(S.matHxOther?S.matHxOther+", ":"")+extra.map(x=>/myomectomy/i.test(x)?("status post "+x.toLowerCase()):x).join(", "); }
    addWarn("Others",others,"已帶入(Thalassemia／其他)，請複核措辭");
  }
  const toco=G("Tocolysis"); if(toco!=null && hisPos(toco)){ S.mgso4=true; addOk("Tocolysis",toco,"安胎(→MgSO4)"); }
  // 血清學
  const hbsag=G("HBsAg"); const hbeag=G("HBeAg");
  if(hbsag!=null){ S.scr.hbsag=hisNeg(hbsag)?"neg":"pos"; (S.scr.hbsag==="pos"?warn:ok).push({k:"HBsAg",raw:hbsag+(hbeag!=null?` (HBeAg ${hbeag})`:""),into:"血清 HBsAg",why:"⚠ HBsAg 陽性請複核"}); }
  const rpr=G("RPR")||G("VDRL"); if(rpr!=null){ S.scr.syphilis=hisNeg(rpr)?"neg":"pos"; if(S.scr.syphilis==="pos") addWarn("RPR/VDRL",rpr,"⚠ 梅毒血清陽性，請複核"); else addOk("RPR/VDRL",rpr,"血清 syphilis 陰性"); }
  const gbs=G("GBS"); if(gbs!=null){ S.scr.gbs=hisNeg(gbs)?"neg":"pos"; (S.scr.gbs==="pos"?warn:ok).push({k:"GBS",raw:gbs,into:"血清 GBS",why:"⚠ GBS 陽性請複核"}); }
  // 藥物
  const drug=G("Drug"); if(drug!=null && !hisNeg(drug)){ S.abx=true; const dm2=drug.match(/(cefazolin|ampicillin|penicillin|curam|augmentin)/i); if(dm2) S.abxDrug=dm2[1].toLowerCase(); addOk("Drug/Abx",drug,"待產抗生素"); }
  const steroid=G("Steroid"); if(steroid!=null && !hisNeg(steroid)){ S.steroid=true; const dates=(steroid.match(/\d{1,2}\/\d{1,2}/g)||[]); S.steroidDose=String(dates.length||2); let sn=steroid.replace(/^\s*Betamethasone\s*/i,"").trim(); if(sn && !/^on\b/i.test(sn)) sn="on "+sn; S.steroidNote=sn; addOk("Steroid",steroid,"產前類固醇"); }
  const mg=G("MgSO4"); if(mg!=null && !hisNeg(mg)){ S.mgso4=true; addOk("MgSO4",mg,"安胎 MgSO4"); }

  /* --- Birth History --- */
  const g=G("G")||hisGet(t,"G"); const gm=t.match(/G[：:]\s*(\d+)\s+P[：:]\s*(\d+)/i);
  if(gm){ S.gravida=gm[1]; S.para=gm[2]; addOk("G/P",`G${gm[1]}P${gm[2]}`,"胎次"); }
  const ga=G("GA"); if(ga){ const m=ga.match(/(\d+)\s*\+\s*(\d+)/); if(m){ S.gaW=m[1]; S.gaD=m[2]; addOk("GA",ga,"妊娠週數"); } }
  const bw=G("Birth weight"); if(bw){ const m=bw.match(/(\d{3,4})/); if(m){ S.bw=m[1]; addOk("Birth weight",bw,"出生體重"); } }
  const del=G("Delivery"); const csr=G("剖腹產原因");
  if(del){
    if(/emergent/i.test(del)||/emergent/i.test(csr||"")) S.delivery="emergent";
    else if(/C\/S|cesarean|剖腹/i.test(del)) S.delivery="cesarean";
    else if(/NSD/i.test(del)) S.delivery="NSD";
    else if(/VD/i.test(del)) S.delivery=/painless|無痛/i.test(del)?"VDpainless":"VD";
    if(S.delivery==="emergent" && csr){ const leftover=csr.replace(/emergent/ig,"").replace(/C\/S/ig,"").replace(/剖腹產?/g,"").replace(/[（）()]/g,"").trim(); if(leftover) S.csReason=leftover; }
    addOk("Delivery",del+(csr?` / ${csr}`:""),"生產方式");
  }
  const bh=G("出生醫院"); if(bh){ S.hospital=/TPEMMH/i.test(bh)?"TPEMMH":bh; addOk("出生醫院",bh,"醫院"); }
  const dtb=G("Day and time of birth"); if(dtb){ S.birthDate=parseDateFlex(dtb); S.birthTime=parseTimeFlex(dtb); addOk("出生日期時間",dtb,"出生日期＋時間"); }
  const edc=G("EDC"); if(edc){ S.edc=parseDateFlex(edc); addOk("EDC",edc,"預產期"); }
  const fd=G("Fetal distress"); if(fd!=null){ S.fetalDistress=!hisNeg(fd); addOk("Fetal distress",fd, hisNeg(fd)?"陰性":"⚠ 陽性"); }
  const ms=G("Meconium stain"); if(ms!=null){ S.meconium=!hisNeg(ms); addOk("Meconium",ms, hisNeg(ms)?"陰性":"⚠ 陽性"); }
  const doic=G("DOIC"); if(doic!=null){ S.doic=!hisNeg(doic); addOk("DOIC",doic, hisNeg(doic)?"陰性":"⚠ 延遲初啼"); }
  // PROM / PPROM
  const pprom=G("PPROM"); const prom=G("PROM");
  if(pprom && !hisNeg(pprom)){ S.rom="PPROM"; const h=pprom.match(/(\d+)/); if(h) S.romHours=h[1]; addOk("PPROM",pprom,"破水 PPROM"); }
  else if(prom && !hisNeg(prom)){ S.rom="PROM"; const h=prom.match(/(\d+)/); if(h) S.romHours=h[1]; addOk("PROM",prom,"破水 PROM"); }
  else if(prom!=null||pprom!=null) addOk("PROM/PPROM",prom||pprom,"無破水");
  // Apgar
  const apg=G("Apgar score"); if(apg){ const pairs=[...apg.matchAll(/(\d+)'\s*\((\d+)\)/g)].map(m=>[+m[1],+m[2]]); if(pairs.length){ S.a1=String((pairs.find(p=>p[0]===1)||pairs[0])[1]); const p5=pairs.find(p=>p[0]===5); if(p5)S.a5=String(p5[1]); const p7=pairs.find(p=>p[0]===7),p10=pairs.find(p=>p[0]===10); if(p7||p10){ S.apgarPts="4"; if(p7)S.a7=String(p7[1]); if(p10)S.a10=String(p10[1]); } else S.apgarPts="2"; addOk("Apgar",apg,"Apgar 分數"); } }

  /* --- 產房急救 --- */
  const o2=G("O2"), ambu=G("Ambu"), endo=G("Endo"), cc=G("Chest compression")||G("CPR");
  if(o2!=null||ambu!=null||endo!=null||cc!=null){
    let lvl="none";
    if(hisPos(o2)||!hisNeg(o2)&&o2==="+") lvl="neopuff";
    if(hisPos(ambu)) lvl="neopuff";
    if(hisPos(endo)) lvl="intubation";
    if(cc && !hisNeg(cc)) lvl="cpr";
    S.resusLevel=lvl;
    addOk("產房急救",`O2:${o2||"-"} Ambu:${ambu||"-"} Endo:${endo||"-"} CC:${cc||"-"}`, lvl==="none"?"無需急救":"急救階梯 "+lvl);
  }

  /* --- Family History → 家系圖 --- */
  const fam=parseFamily(t);
  if(fam.applied){ addOk("Family History",fam.summary,"家系圖已產生"); }
  // 社會史（不帶入 admission note）
  ["計劃性轉診","居家主要照顧者","家庭類型","家族病史"].forEach(l=>{ const v=G(l); if(v!=null) addWarn(l,v,"社會史，未帶入 admission note（供參考）"); });

  return {ok,warn};
}

// 解析 Father/Mother/Sibling → S.sibs（依年齡排序，本案在最後）
function parseFamily(t){
  const sibs=[];
  const sibLines=[...t.matchAll(/Sibling[^:：]*[:：]\s*([^\n]+)/gi)];
  const parsed=[];
  sibLines.forEach(m=>{
    const line=m[1];
    // 可能一行多個手足，用逗號或分號分
    line.split(/[,;]|、/).forEach(seg=>{
      const ageM=seg.match(/(\d+)\s*(?:y\/o|yo|y|歲)/i);
      const isB=/brother|male|男|哥|弟|兄|son/i.test(seg);
      const isG=/sister|female|女|姊|妹|daughter/i.test(seg);
      if(ageM||isB||isG){ parsed.push({age:ageM?+ageM[1]:999, sex:isB?"boy":(isG?"girl":"girl")}); }
    });
  });
  // 年齡大到小（哥哥/姊姊在前），本案 proband 加在最後
  parsed.sort((a,b)=>b.age-a.age);
  parsed.forEach(s=>sibs.push({sex:s.sex,proband:false}));
  sibs.push({sex:S.sex,proband:true});
  S.sibs=sibs;
  const fa=t.match(/Father[^:：]*[:：]\s*([^\n]+)/i);
  const mo=t.match(/Mother[^:：]*[:：]\s*([^\n]+)/i);
  return {applied:true, summary:`父 ${fa?fa[1].trim():"?"} / 母 ${mo?mo[1].trim():"?"} / 手足 ${parsed.length} 人＋本案`};
}

// 把 S 同步回表單 DOM
function applyStateToForm(){
  $$("[data-k]").forEach(el=>{
    const k=el.dataset.k;
    if(el.type==="checkbox"){ el.checked=!!S[k]; toggleChip(el); }
    else if(S[k]!==undefined && S[k]!==null){ el.value=S[k]; }
  });
  $$("[data-mh]").forEach(el=>{ el.checked=!!S.matHx[el.dataset.mh]; toggleChip(el); });
  $$("[data-sym]").forEach(el=>{ el.checked=!!S.symptoms[el.dataset.sym]; toggleChip(el); });
  $$("[data-phys]").forEach(el=>{ el.checked=!!S.physical[el.dataset.phys]; toggleChip(el); });
  $$("[data-dx]").forEach(el=>{ el.checked=!!S.dx[el.dataset.dx]; toggleChip(el); });
  const scrTxt={neg:"陰",pos:"陽",unknown:"未驗"};
  $$("#scrChecks [data-scr]").forEach(el=>{ const k=el.dataset.scr; el.querySelector(".v").textContent=scrTxt[S.scr[k]]; el.classList.toggle("pos",S.scr[k]==="pos"); el.classList.toggle("on",S.scr[k]!=="neg"); });
  renderSibs();
}

// 渲染綠/黃對應狀態
function renderReview(res){
  const box=$("#reviewPanel");
  const rows=[
    ...res.ok.map(r=>`<div class="rev ok"><span class="rk">${r.k}</span><span class="rv">${escapeHtml(r.raw)}</span><span class="rt">✓ ${r.into||r.why||"已帶入"}</span></div>`),
    ...res.warn.map(r=>`<div class="rev warn"><span class="rk">${r.k}</span><span class="rv">${escapeHtml(r.raw)}</span><span class="rt">⚠ ${r.why||"待確認"}</span></div>`)
  ];
  box.innerHTML=rows.join("");
  $("#revLegend").style.display=rows.length?"flex":"none";
  $("#parseSummary").textContent=`已對應 ${res.ok.length} 項，待確認 ${res.warn.length} 項`;
}
function escapeHtml(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

function runParse(){
  const text=$("#pasteBox").value.trim();
  if(!text){ toast("請先貼上病歷"); return; }
  try{
    const res=parseHIS(text);
    applyStateToForm();
    renderReview(res);
    forceRegen();
    toast("已解析並帶入");
  }catch(err){
    $("#parseSummary").textContent="解析發生錯誤："+(err&&err.message||err);
    console.error(err);
  }
}

/* ---------- 初始化 ---------- */
function initForm(){
  $("#form").innerHTML=FORM_HTML;
  // 篩檢 chips（三態）
  const scrLabel={hbsag:"HBsAg",syphilis:"Syphilis",rubella:"Rubella",hiv:"HIV",gbs:"GBS"};
  const scrTxt={neg:"陰",pos:"陽",unknown:"未驗"};
  $("#scrChecks").innerHTML=Object.keys(scrLabel).map(k=>
    `<span class="chk scr3 ${S.scr[k]==='pos'?'pos':''}" data-scr="${k}">${scrLabel[k]}: <b class="v">${scrTxt[S.scr[k]]}</b></span>`).join("");

  bindInputs();
  renderSibs();
  loadOperator();
  regen();
}

function bindInputs(){
  // 一般 data-k
  $$("[data-k]").forEach(el=>{
    const k=el.dataset.k;
    if(el.type==="checkbox"){ el.checked=!!S[k]; el.addEventListener("change",()=>{S[k]=el.checked; toggleChip(el); regen();}); toggleChip(el); }
    else { if(S[k]!==undefined && S[k]!=="") el.value=S[k]; el.addEventListener("input",()=>{S[k]=el.value; regen();}); }
  });
  // 母體病史
  $$("[data-mh]").forEach(el=>{
    el.addEventListener("change",()=>{S.matHx[el.dataset.mh]=el.checked; toggleChip(el); regen();});
  });
  // 症狀
  $$("[data-sym]").forEach(el=>el.addEventListener("change",()=>{S.symptoms[el.dataset.sym]=el.checked; toggleChip(el); regen();}));
  // 理學
  $$("[data-phys]").forEach(el=>el.addEventListener("change",()=>{S.physical[el.dataset.phys]=el.checked; toggleChip(el); regen();}));
  // 診斷
  $$("[data-dx]").forEach(el=>el.addEventListener("change",()=>{S.dx[el.dataset.dx]=el.checked; toggleChip(el); regen();}));
  // 篩檢三態：陰→陽→未驗→陰
  const scrTxt={neg:"陰",pos:"陽",unknown:"未驗"};
  const scrNext={neg:"pos",pos:"unknown",unknown:"neg"};
  $$("#scrChecks [data-scr]").forEach(el=>{
    const k=el.dataset.scr;
    el.addEventListener("click",e=>{
      e.preventDefault();
      S.scr[k]=scrNext[S.scr[k]];
      el.querySelector(".v").textContent=scrTxt[S.scr[k]];
      el.classList.toggle("pos",S.scr[k]==="pos");
      el.classList.toggle("on",S.scr[k]!=="neg");
      regen();
    });
  });
  $("#addSib").addEventListener("click",()=>{S.sibs.push({sex:"girl",proband:false}); renderSibs(); regen();});
  // HIS 貼上解析
  $("#parseBtn").addEventListener("click",runParse);
  $("#clearParseBtn").addEventListener("click",()=>{ $("#pasteBox").value=""; $("#reviewPanel").innerHTML=""; $("#revLegend").style.display="none"; $("#parseSummary").textContent=""; });
}

function toggleChip(el){ const chip=el.closest(".chk"); if(chip) chip.classList.toggle("on", el.checked); }

function renderSibs(){
  const box=$("#sibList");
  box.innerHTML=S.sibs.map((s,i)=>`
    <div class="row-inline" style="margin:5px 0">
      <span style="width:22px">${i+1}.</span>
      <select data-sib="${i}" data-f="sex"><option value="girl"${s.sex==="girl"?" selected":""}>女○</option><option value="boy"${s.sex==="boy"?" selected":""}>男□</option></select>
      <label class="chk"><input type="checkbox" data-sib="${i}" data-f="proband"${s.proband?" checked":""}> 本人</label>
      <button type="button" class="btn ghost mini" data-del="${i}">✕</button>
    </div>`).join("")||'<div class="hint">尚無手足</div>';
  $$("[data-sib]",box).forEach(el=>{
    el.addEventListener("change",()=>{
      const i=+el.dataset.sib, f=el.dataset.f;
      if(f==="proband"){ if(el.checked) S.sibs.forEach((x,j)=>x.proband=(j===i)); else S.sibs[i].proband=false; renderSibs(); }
      else S.sibs[i][f]=el.value;
      regen();
    });
  });
  $$("[data-del]",box).forEach(el=>el.addEventListener("click",()=>{S.sibs.splice(+el.dataset.del,1); renderSibs(); regen();}));
}

/* ---------- 產稿/複製（含顏色標示）---------- */
function escOut(s){ return String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
// 已帶入的關鍵值（綠）——挑不易誤判的多字值
function greenVals(){
  return [
    S.birthDate?fmtDate(S.birthDate):null,
    S.edc?fmtDate(S.edc):null,
    S.gaW?`${S.gaW}${S.gaD?"+"+S.gaD:""} weeks`:null,
    S.bw?`${S.bw} g`:null,
    S.birthTime||null,
    (S.ancPlace==="outside"&&S.ancOutside)?S.ancOutside:null
  ].filter(v=>v&&String(v).trim());
}
function renderOutput(text){
  let h=escOut(text);
  // 綠：關鍵值首次出現先用文字 sentinel 標記，避免與黃色規則衝突
  const A="[[OKS]]", B="[[OKE]]";
  greenVals().forEach(v=>{ const ev=escOut(v); const i=h.indexOf(ev); if(i>=0) h=h.slice(0,i)+A+ev+B+h.slice(i+ev.length); });
  // 黃：placeholder（含底線片段，如 ____/__/__、____ g、__ weeks、Apgar _）
  h=h.replace(/[_\/]*_[_\/]*/g, m=>`<span class="hl-warn">${m}</span>`);
  h=h.split(A).join('<span class="hl-ok">').split(B).join("</span>");
  return h;
}
function regen(){ if(manualEdit) return; $("#output").innerHTML=renderOutput(generate()); }
function forceRegen(){ manualEdit=false; $("#editFlag").classList.remove("on"); $("#output").innerHTML=renderOutput(generate()); }

$("#output").addEventListener("input",()=>{ manualEdit=true; $("#editFlag").classList.add("on"); });
$("#regenBtn").addEventListener("click",forceRegen);
$("#unlockBtn").addEventListener("click",forceRegen);
$("#copyBtn").addEventListener("click",async()=>{
  const txt=$("#output").innerText || $("#output").textContent;
  try{ await navigator.clipboard.writeText(txt); toast("已複製"); }
  catch{ const r=document.createRange(); r.selectNodeContents($("#output")); const sel=window.getSelection(); sel.removeAllRanges(); sel.addRange(r); document.execCommand("copy"); sel.removeAllRanges(); toast("已複製"); }
});

/* ---------- 紀年切換 ---------- */
$$("#eraToggle button").forEach(b=>b.addEventListener("click",()=>{
  ERA=b.dataset.era; $$("#eraToggle button").forEach(x=>x.classList.toggle("on",x===b)); regen();
}));

/* ---------- operator localStorage ---------- */
function loadOperator(){ try{ const v=localStorage.getItem("nnb_operator"); if(v){ S.operator=v; const el=$('[data-k="operator"]'); if(el) el.value=v; } }catch(e){} }
$("#form").addEventListener("input",e=>{ if(e.target.dataset.k==="operator"){ try{ localStorage.setItem("nnb_operator",e.target.value); }catch(err){} } });

/* ---------- toast ---------- */
let toastT;
function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("on"); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("on"),1400); }

initForm();
</script>
